<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        /* element selector   
         div{
            background-color: aqua;
        } */

        /* class selector */
        .red {
            color: red;
        }

        /* id selector  */
        #green{
        color: green; 
        }
        /* child selector  */
        div > p{
            color: blue;
            background-color: brown;
        }
      /* decendent selection  */
        div p{
            background-color: antiquewhite;
        }

        /* universal selector  */
        *{
            margin: 0;
            padding: 0;
        }

        /* pseudo selector */
a:visited{
    color: yellow;
}

a:link{
    color: green;
}
a:active{
    background-color: red;
}
a:hover{
    background-color: yellow;
}
p:first-child{
    background-color: aqua;
}

    </style>
</head>
